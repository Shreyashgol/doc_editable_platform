# Render Blueprint: API (web) + worker (background) from the backend Dockerfile.
# Single datastore: Neon Postgres holds metadata, the job queue, AND object blobs
# (APP_OBJECT_STORE_BACKEND=postgres) — no MinIO/S3 to provision.
# Create in Render → "New +" → "Blueprint", pointed at this repo.
services:
  - type: web
    name: docai-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health/ready
    preDeployCommand: alembic upgrade head # run migrations before each deploy goes live
    envVars:
      - key: APP_ENVIRONMENT
        value: production
      - key: APP_OBJECT_STORE_BACKEND
        value: postgres
      - key: APP_DB_REQUIRE_SSL
        value: "true"
      - key: APP_CLAMAV_ENABLED
        value: "false" # set true + run a clamav service to enable AV scanning
      - key: APP_OCR_BACKEND
        value: none # "paddle" only on an image built with INSTALL_ML=true
      - key: APP_EMBEDDING_BACKEND
        value: hash # "openclip" only on an ML image; must match the worker
      - key: APP_JWT_SECRET
        generateValue: true
      # --- secrets: set in the Render dashboard ---
      - key: APP_DATABASE_URL # postgresql+asyncpg://USER:PASS@HOST/db  (Neon pooled)
        sync: false
      - key: APP_DATABASE_SYNC_URL # postgresql+psycopg://USER:PASS@HOST/db?sslmode=require
        sync: false
      - key: APP_CORS_ALLOW_ORIGINS # your Vercel URL, e.g. https://docai.vercel.app
        sync: false

  - type: worker
    name: docai-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    dockerCommand: python -m app.interfaces.worker.run
    envVars:
      - key: APP_ENVIRONMENT
        value: production
      - key: APP_OBJECT_STORE_BACKEND
        value: postgres
      - key: APP_DB_REQUIRE_SSL
        value: "true"
      - key: APP_OCR_BACKEND
        value: none
      - key: APP_EMBEDDING_BACKEND
        value: hash
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_DATABASE_URL
        sync: false
      - key: APP_DATABASE_SYNC_URL
        sync: false
