# Self-contained local stack. No Redis/Celery (ADR 0005) — the queue lives in Postgres.
# To use Neon instead of the local DB, set APP_DATABASE_URL / APP_DATABASE_SYNC_URL in .env
# and you may remove the `postgres` service + its depends_on entries.
name: docai

x-app-env: &app-env
  APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
  APP_JWT_SECRET: ${APP_JWT_SECRET:-local-dev-secret-change-me}
  APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql+asyncpg://docai:docai@postgres:5432/docai}
  APP_DATABASE_SYNC_URL: ${APP_DATABASE_SYNC_URL:-postgresql+psycopg://docai:docai@postgres:5432/docai}
  APP_S3_ENDPOINT_URL: http://minio:9000
  APP_S3_ACCESS_KEY: ${APP_S3_ACCESS_KEY:-minioadmin}
  APP_S3_SECRET_KEY: ${APP_S3_SECRET_KEY:-minioadmin}
  APP_S3_BUCKET: documents
  APP_CLAMAV_ENABLED: ${APP_CLAMAV_ENABLED:-true}
  APP_CLAMAV_HOST: clamav
  APP_OCR_BACKEND: ${APP_OCR_BACKEND:-none}
  APP_EMBEDDING_BACKEND: ${APP_EMBEDDING_BACKEND:-hash}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: docai
      POSTGRES_PASSWORD: docai
      POSTGRES_DB: docai
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docai"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${APP_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${APP_S3_SECRET_KEY:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${APP_S3_ACCESS_KEY:-minioadmin} ${APP_S3_SECRET_KEY:-minioadmin} &&
      mc mb -p local/documents || true"

  clamav:
    image: clamav/clamav:latest
    ports: ["3310:3310"]
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "echo PING | nc -w 5 localhost 3310 | grep -q PONG"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  migrate:
    build: {context: ../backend}
    command: ["alembic", "upgrade", "head"]
    environment: *app-env
    depends_on:
      postgres: {condition: service_healthy}

  api:
    build: {context: ../backend}
    environment: *app-env
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: {context: ../backend}
    command: ["python", "-m", "app.interfaces.worker.run"]
    environment: *app-env
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    deploy:
      replicas: 2

  prometheus:
    image: prom/prometheus:latest
    volumes: ["./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  postgres-data:
  minio-data:
