name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docai
          POSTGRES_PASSWORD: docai
          POSTGRES_DB: docai
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U docai"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      APP_ENVIRONMENT: test
      APP_JWT_SECRET: ci-secret-value
      APP_DATABASE_URL: postgresql+asyncpg://docai:docai@localhost:5432/docai
      APP_DATABASE_SYNC_URL: postgresql+psycopg://docai:docai@localhost:5432/docai
      APP_DB_REQUIRE_SSL: "false"
      APP_CLAMAV_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with ML + dev extras for full coverage)
        run: |
          python -m pip install --upgrade pip
          pip install ".[ml,dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Type check (mypy, advisory)
        run: mypy app || true   # strict mypy is advisory until the baseline is clean
      - name: Security scan (bandit)
        run: bandit -q -r app -x app/interfaces/worker/run.py
      - name: Dependency audit (pip-audit)
        run: pip-audit || true   # advisory; do not block on transitive CVEs
      - name: Migrate
        run: alembic upgrade head
      - name: Tests + coverage gate (>=90%)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=90

  docker:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t docai-backend:ci backend
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docai-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "0"   # report-only initially; flip to 1 to enforce
